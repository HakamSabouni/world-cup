
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap');

  header {

  header h1 {

    letter-spacing: 3px;

    letter-spacing: 1.5px;
    text-transform: uppercase;

    transition: all 0.2s;

  }

  nav button.active {

    border-bottom-color: var(--gold);
  }

  nav button:hover:not(.active) { color: var(--text); }

  .page { display: none; padding: 20px; }
  .page.active { display: block; }

  .group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .group-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .group-header {
    background: linear-gradient(90deg, var(--gold) 0%, #b8960c 100%);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .group-header h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: #0a0f1e;
  }

  .group-header .team-count {
    font-size: 11px;
    font-weight: 600;
    color: rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }

  .team-list { padding: 8px 0; }

  .team-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);

  .team-row:last-child { border-bottom: none; }
  .team-row:hover { background: rgba(212,175,55,0.05); }

  .team-pos {
    width: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    text-align: center;

  .team-flag,
  .fixture-flag,

    display: inline-flex;

    justify-content: center;

    font-size: 18px;

  .team-name {

  /* Fixtures page */
  .fixtures-controls {
    display: flex;
    gap: 12px;

    align-items: center;

  .group-select-wrapper {
    display: flex;
    align-items: center;

  .group-select-wrapper label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;

  }

  select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;

    font-size: 13px;

  .btn.primary { background: var(--gold); color: #0a0f1e; }

  .fixtures-list { display: flex; flex-direction: column; gap: 8px; }

    display: flex;
    align-items: center;

    justify-content: center;

    width: 44px;
    height: 36px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    text-align: center;
    outline: none;

  }

  .score-input:focus { border-color: var(--gold); }
  .score-input::placeholder { color: rgba(212,175,55,0.2); }

  .score-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--muted);
  }

  /* Standings table */
  .standings-table-wrap { overflow-x: auto; }

  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 500px;
  }

  .standings-table th {
    text-align: center;
    padding: 10px 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);

  .standings-table th:nth-child(2) { text-align: left; }

  .standings-table td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);

  .standings-table td:nth-child(2) { text-align: left; }

  .standings-table tr.qualified td { background: rgba(29,185,84,0.05); }

  .pos-badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    background: var(--dark);
    color: var(--muted);
  }

  .pos-badge.q { background: rgba(212,175,55,0.15); color: var(--gold); }

  .pts-cell { font-weight: 700; color: var(--gold); }

  .form-cell { display: flex; gap: 3px; justify-content: center; }

  /* Knockout page */
  .bracket-stage {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
  }

  .stage-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }

  .knockout-match {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    max-width: 440px;
    margin: 0 auto;
  }

  .knockout-team {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s;

  .knockout-team:last-child { border-bottom: none; }
  .knockout-team.winner { background: rgba(212,175,55,0.07); }
  .knockout-team.placeholder { color: var(--muted); font-style: italic; }

  .kt-name { flex: 1; font-size: 14px; font-weight: 500; }
  .kt-score { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }

  .kt-score-input {
    width: 44px;
    height: 34px;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    text-align: center;
    outline: none;
  }

  .kt-score-input:focus { border-color: var(--gold); }

  .champion-box {
    text-align: center;
    padding: 24px;
    background: linear-gradient(135deg, rgba(212,175,55,0.1) 0%, rgba(212,175,55,0.03) 100%);
    border: 1px solid var(--gold);
    border-radius: 12px;
    max-width: 300px;
    margin: 0 auto;
  }

  .champion-box .trophy { font-size: 48px; margin-bottom: 12px; }
  .champion-box h2 { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 3px; color: var(--muted); margin-bottom: 6px; }
  .champion-box .champ-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--gold); }

  .generate-section {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
  }

  .generate-section p { font-size: 14px; margin-bottom: 16px; }

  /* Pill badges */
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .pill.green { background: rgba(29,185,84,0.15); color: #1DB954; }
  .pill.gold { background: rgba(212,175,55,0.15); color: var(--gold); }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--text);
    margin-bottom: 14px;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }

  .standings-group-sel { margin-bottom: 16px; }

  .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
</style>

<div id="app">
  <header>
    <div class="trophy-icon">🏆</div>
    <div>
      <h1>World Cup 2026</h1>
      <p>Tournament Tracker</p>
    </div>
  </header>

  <nav>
    <button class="active" onclick="showPage('groups')">Groups</button>
    <button onclick="showPage('fixtures')">Fixtures</button>
    <button onclick="showPage('standings')">Standings</button>
    <button onclick="showPage('knockout')">Knockout</button>
  </nav>

  <div id="page-groups" class="page active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div class="section-title">Group Stage</div>
      <span class="pill gold">12 Groups · 48 Teams</span>
    </div>
    <div class="group-grid" id="all-groups-display"></div>
  </div>

  <div id="page-fixtures" class="page">
    <div class="fixtures-controls">
      <div class="group-select-wrapper">
        <label>Group</label>
        <select id="group-select" onchange="onGroupChange()"></select>
      </div>
      <button class="btn primary" onclick="saveAndUpdate()">Update standings</button>
    </div>
    <div class="fixtures-list" id="fixtures-list"></div>
  </div>

  <div id="page-standings" class="page">
    <div class="standings-group-sel">
      <div class="fixtures-controls">
        <div class="group-select-wrapper">
          <label>Group</label>
          <select id="standings-group-select" onchange="renderStandingsPage()"></select>
        </div>
      </div>
    </div>
    <div class="standings-table-wrap">
      <table class="standings-table">
        <thead>
          <tr>
            <th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th>
            <th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>Form</th>
          </tr>
        </thead>
        <tbody id="standings-body"></tbody>
      </table>
    </div>
  </div>

  <div id="page-knockout" class="page">
    <div id="knockout-content"></div>
  </div>
</div>

<script>
const FLAGS = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","Korea Republic":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Bosnia and Herzegovina":"🇧🇦","Qatar":"🇶🇦","Swisserland":"🇨🇭",
  "Brazil":"🇧🇷","Marocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "united states":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷",
  "Germany":"🇩🇪","Ciraco":"🏳️","Kut-divoar":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Sweden":"🇸🇪","Tunisia":"🇹🇳",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Uruguay":"🇺🇾","Saudi Arabia":"🇸🇦","Spain":"🇪🇸","Kaap Verde":"🇨🇻",
  "France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴",
  "Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","Ghana":"🇬🇭","Uzbekistan":"🇺🇿","Colombia":"🇨🇴",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Coratia":"🇭🇷","Panama":"🇵🇦","Irland":"🇮🇪"
};

const GROUPS = {
  groupA:{label:"Group A",teams:["Mexico","South Africa","Korea Republic","Czechia"]},
  groupB:{label:"Group B",teams:["Canada","Bosnia and Herzegovina","Qatar","Swisserland"]},
  groupC:{label:"Group C",teams:["Brazil","Marocco","Haiti","Scotland"]},
  groupD:{label:"Group D",teams:["united states","Paraguay","Australia","Turkey"]},
  groupE:{label:"Group E",teams:["Germany","Ciraco","Kut-divoar","Ecuador"]},
  groupF:{label:"Group F",teams:["Netherlands","Japan","Sweden","Tunisia"]},
  groupG:{label:"Group G",teams:["Belgium","Egypt","Iran","New Zealand"]},
  groupH:{label:"Group H",teams:["Uruguay","Saudi Arabia","Spain","Kaap Verde"]},
  groupI:{label:"Group I",teams:["France","Senegal","Iraq","Norway"]},
  groupJ:{label:"Group J",teams:["Argentina","Algeria","Austria","Jordan"]},
  groupK:{label:"Group K",teams:["Portugal","Ghana","Uzbekistan","Colombia"]},
  groupL:{label:"Group L",teams:["England","Coratia","Panama","Irland"]}
};

const groupKeys = Object.keys(GROUPS);

function flag(name) { return FLAGS[name] || "🏳️"; }

function getStore() {
  try { return JSON.parse(localStorage.getItem('wc2026') || '{}'); } catch { return {}; }
}

function setStore(data) {
  try { localStorage.setItem('wc2026', JSON.stringify(data)); } catch {}
}

function buildFixtures(teams) {
  const res = [];
  for (let i = 0; i < teams.length; i++)
    for (let j = i+1; j < teams.length; j++)
      res.push({home:teams[i],away:teams[j],homeScore:null,awayScore:null});
  return res;
}

function loadFixtures(gk) {
  const s = getStore();
  if (s.fixtures && s.fixtures[gk]) return s.fixtures[gk];
  return buildFixtures(GROUPS[gk].teams);
}

function saveFixtures(gk, fixtures) {
  const s = getStore();
  s.fixtures = s.fixtures || {};
  s.fixtures[gk] = fixtures;
  setStore(s);
}

function computeStandings(gk) {
  const teams = GROUPS[gk].teams;
  const fixtures = loadFixtures(gk);
  const stats = {};
  teams.forEach(t => { stats[t]={name:t,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,pts:0,form:[]}; });
  fixtures.forEach(m => {
    const hs = m.homeScore, as = m.awayScore;
    if (hs===null||as===null||isNaN(hs)||isNaN(as)) return;
    const h=stats[m.home], a=stats[m.away];
    if (!h||!a) return;
    h.played++; a.played++;
    h.gf+=hs; h.ga+=as; a.gf+=as; a.ga+=hs;
    if (hs>as) { h.wins++;h.pts+=3;h.form.push('W'); a.losses++;a.form.push('L'); }
    else if (hs<as) { a.wins++;a.pts+=3;a.form.push('W'); h.losses++;h.form.push('L'); }
    else { h.draws++;h.pts++;h.form.push('D'); a.draws++;a.pts++;a.form.push('D'); }
  });
  Object.values(stats).forEach(t=>t.gd=t.gf-t.ga);
  return Object.values(stats).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

/* ── Pages ─────────────────────────────────────────────────────── */

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b,i)=>{
    const pages=['groups','fixtures','standings','knockout'];
    b.classList.toggle('active', pages[i]===id);
  });
  document.getElementById('page-'+id).classList.add('active');
  if (id==='groups') renderAllGroups();
  if (id==='standings') renderStandingsPage();
  if (id==='knockout') renderKnockoutPage();
}

/* ── Groups overview ─────────────────────────────────────────────── */

function renderAllGroups() {
  const container = document.getElementById('all-groups-display');
  container.innerHTML = '';
  groupKeys.forEach(gk => {
    const g = GROUPS[gk];
    const standings = computeStandings(gk);
    const card = document.createElement('div');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-header">
        <h3>${g.label}</h3>
        <span class="team-count">4 Teams</span>
      </div>
      <div class="team-list">
        ${standings.map((t,i)=>`
          <div class="team-row" onclick="goToGroupFixtures('${gk}')">
            <span class="team-pos">${i+1}</span>
            <span class="team-flag">${flag(t.name)}</span>
            <span class="team-name">${t.name}</span>
            <div class="team-form">${t.form.slice(-3).map(f=>`<div class="form-dot ${f}"></div>`).join('')}</div>
            <span class="team-pts">${t.pts}</span>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(card);
  });
}

function goToGroupFixtures(gk) {
  document.getElementById('group-select').value = gk;
  showPage('fixtures');
  renderFixturesPage();
}

/* ── Fixtures page ─────────────────────────────────────────────── */

let currentGroupKey = 'groupA';
let currentFixtures = [];

function initGroupSelect() {
  const sel = document.getElementById('group-select');
  const sel2 = document.getElementById('standings-group-select');
  groupKeys.forEach(gk => {
    const o = new Option(GROUPS[gk].label, gk);
    sel.appendChild(o.cloneNode(true));
    sel2.appendChild(o);
  });
}

function onGroupChange() {
  currentGroupKey = document.getElementById('group-select').value;
  renderFixturesPage();
}

function renderFixturesPage() {
  currentGroupKey = document.getElementById('group-select').value;
  currentFixtures = loadFixtures(currentGroupKey).map(f=>({...f}));
  const list = document.getElementById('fixtures-list');
  list.innerHTML = '';
  currentFixtures.forEach((m, idx) => {
    const row = document.createElement('div');
    row.className = 'fixture-row';
    row.innerHTML = `
      <div class="fixture-team home">
        <span class="fixture-flag">${flag(m.home)}</span>
        <span>${m.home}</span>
      </div>
      <div class="fixture-score">
        <input class="score-input" type="number" min="0" placeholder="—" data-idx="${idx}" data-side="home"
          value="${m.homeScore!==null?m.homeScore:''}" />
        <span class="score-sep">:</span>
        <input class="score-input" type="number" min="0" placeholder="—" data-idx="${idx}" data-side="away"
          value="${m.awayScore!==null?m.awayScore:''}" />
      </div>
      <div class="fixture-team away">
        <span class="fixture-flag">${flag(m.away)}</span>
        <span>${m.away}</span>
      </div>`;
    list.appendChild(row);
  });
  list.querySelectorAll('.score-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const idx = +e.target.dataset.idx, side = e.target.dataset.side;
      const v = e.target.value.trim();
      currentFixtures[idx][side+'Score'] = v==='' ? null : +v;
    });
  });
}

function saveAndUpdate() {
  saveFixtures(currentGroupKey, currentFixtures);
  renderAllGroups();
  const btn = document.querySelector('#page-fixtures .btn.primary');
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Update standings', 1500);
}

/* ── Standings page ─────────────────────────────────────────────── */

function renderStandingsPage() {
  const gk = document.getElementById('standings-group-select').value;
  const standings = computeStandings(gk);
  const body = document.getElementById('standings-body');
  body.innerHTML = '';
  standings.forEach((t, i) => {
    const tr = document.createElement('tr');
    if (i < 2) tr.className = 'qualified';
    tr.innerHTML = `
      <td><span class="pos-badge ${i<2?'q':''}">${i+1}</span></td>
      <td><span class="fixture-flag">${flag(t.name)}</span> ${t.name}</td>
      <td>${t.played}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.losses}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td style="color:${t.gd>0?'#1DB954':t.gd<0?'#E24B4A':'inherit'}">${t.gd>0?'+':''}${t.gd}</td>
      <td class="pts-cell">${t.pts}</td>
      <td><div class="form-cell">${t.form.slice(-5).map(f=>`<div class="form-dot ${f}"></div>`).join('')}</div></td>`;
    body.appendChild(tr);
  });
}

/* ── Knockout page ─────────────────────────────────────────────── */

let knockoutData = null;

function getTop2(gk) {
  return computeStandings(gk).slice(0,2).map(t=>t.name);
}

function renderKnockoutPage() {
  const s = getStore();
  const kd = s.knockout || null;
  const content = document.getElementById('knockout-content');

  if (!kd) {
    content.innerHTML = `
      <div class="generate-section">
        <p>Complete the group stage to generate the knockout bracket.</p>
        <button class="btn primary" onclick="generateKnockout()">Generate Knockout Bracket</button>
      </div>`;
    return;
  }

  knockoutData = kd;
  renderBracket(content);
}

function generateKnockout() {
  const rounds = [];
  const top2 = {};
  groupKeys.forEach(gk => top2[gk] = getTop2(gk));
  const gks = groupKeys;
  const r16 = [];
  for (let i = 0; i < gks.length; i += 2) {
    r16.push({home: top2[gks[i]][0], away: top2[gks[i+1]][1], homeScore:null, awayScore:null, stage:'Round of 16'});
    r16.push({home: top2[gks[i+1]][0], away: top2[gks[i]][1], homeScore:null, awayScore:null, stage:'Round of 16'});
  }
  const kd = { r16, qf:[], sf:[], final:null, champion:null };
  const s = getStore(); s.knockout = kd; setStore(s);
  renderKnockoutPage();
}

function winner(m) {
  if (m.homeScore===null||m.awayScore===null) return null;
  if (m.homeScore>m.awayScore) return m.home;
  if (m.homeScore<m.awayScore) return m.away;
  return null;
}

function renderBracket(container) {
  const kd = knockoutData;
  let html = '';

  html += `<div class="stage-label">Round of 16</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:24px;">`;
  kd.r16.forEach((m,i)=>{
    const w = winner(m);
    html += knockoutMatchHTML(m, 'r16', i, w);
  });
  html += '</div>';

  if (kd.qf && kd.qf.length) {
    html += `<div class="stage-label">Quarter-finals</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:24px;">`;
    kd.qf.forEach((m,i)=>{ const w=winner(m); html+=knockoutMatchHTML(m,'qf',i,w); });
    html += '</div>';
  }

  if (kd.sf && kd.sf.length) {
    html += `<div class="stage-label">Semi-finals</div>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:24px;">`;
    kd.sf.forEach((m,i)=>{ const w=winner(m); html+=knockoutMatchHTML(m,'sf',i,w); });
    html += '</div>';
  }

  if (kd.final) {
    html += `<div class="stage-label">Final</div>`;
    html += `<div style="margin-bottom:24px;">`;
    html += knockoutMatchHTML(kd.final,'final',0,winner(kd.final));
    html += '</div>';
  }

  if (kd.champion) {
    html += `<div class="champion-box"><div class="trophy">🏆</div><h2>World Champion 2026</h2><div class="champ-name">${flag(kd.champion)} ${kd.champion}</div></div>`;
  }

  html += `<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;">`;
  if (!kd.qf || !kd.qf.length) html += `<button class="btn" onclick="advanceRound('r16')">Advance to QF</button>`;
  if (kd.qf && kd.qf.length && (!kd.sf || !kd.sf.length)) html += `<button class="btn" onclick="advanceRound('qf')">Advance to SF</button>`;
  if (kd.sf && kd.sf.length && !kd.final) html += `<button class="btn" onclick="advanceRound('sf')">Advance to Final</button>`;
  if (kd.final && !kd.champion) html += `<button class="btn primary" onclick="advanceRound('final')">Crown Champion!</button>`;
  html += `<button class="btn" style="margin-left:auto;border-color:var(--red);color:var(--red)" onclick="resetKnockout()">Reset Bracket</button>`;
  html += '</div>';

  container.innerHTML = html;

  container.querySelectorAll('.kt-score-input').forEach(inp => {
    inp.addEventListener('change', e => {
      const {round, idx, side} = e.target.dataset;
      const v = e.target.value.trim();
      const kd2 = getStore().knockout;
      if (round==='final') kd2.final[side+'Score'] = v===''?null:+v;
      else kd2[round][+idx][side+'Score'] = v===''?null:+v;
      const s2 = getStore(); s2.knockout = kd2; setStore(s2);
      knockoutData = kd2;
    });
  });
}

function knockoutMatchHTML(m, round, idx, w) {
  const ph = '—';
  const hIsHolder = !m.home || m.home.startsWith('TBD');
  const aIsHolder = !m.away || m.away.startsWith('TBD');
  return `<div class="knockout-match">
    <div class="knockout-team ${w===m.home?'winner':''} ${hIsHolder?'placeholder':''}">
      <span class="kt-flag">${hIsHolder?'🏳️':flag(m.home)}</span>
      <span class="kt-name">${m.home||'TBD'}</span>
      <input class="kt-score-input" type="number" min="0" placeholder="—"
        data-round="${round}" data-idx="${idx}" data-side="home"
        value="${m.homeScore!==null?m.homeScore:''}" />
    </div>
    <div class="knockout-team ${w===m.away?'winner':''} ${aIsHolder?'placeholder':''}">
      <span class="kt-flag">${aIsHolder?'🏳️':flag(m.away)}</span>
      <span class="kt-name">${m.away||'TBD'}</span>
      <input class="kt-score-input" type="number" min="0" placeholder="—"
        data-round="${round}" data-idx="${idx}" data-side="away"
        value="${m.awayScore!==null?m.awayScore:''}" />
    </div>
  </div>`;
}

function advanceRound(from) {
  const s = getStore();
  const kd = s.knockout;
  let src = from==='final' ? [kd.final] : kd[from];
  const winners = src.map(m=>winner(m));
  if (winners.some(w=>!w)) { alert('Enter all scores first!'); return; }

  if (from==='r16') {
    kd.qf = [];
    for (let i=0;i<winners.length;i+=2)
      kd.qf.push({home:winners[i],away:winners[i+1],homeScore:null,awayScore:null,stage:'Quarter-final'});
  } else if (from==='qf') {
    kd.sf = [];
    for (let i=0;i<winners.length;i+=2)
      kd.sf.push({home:winners[i],away:winners[i+1],homeScore:null,awayScore:null,stage:'Semi-final'});
  } else if (from==='sf') {
    kd.final = {home:winners[0],away:winners[1],homeScore:null,awayScore:null,stage:'Final'};
  } else if (from==='final') {
    kd.champion = winner(kd.final);
  }
  s.knockout = kd; setStore(s);
  knockoutData = kd;
  renderBracket(document.getElementById('knockout-content'));
}

function resetKnockout() {
  const s = getStore(); delete s.knockout; setStore(s);
  knockoutData = null;
  renderKnockoutPage();
}

/* ── Init ─────────────────────────────────────────────────────── */
initGroupSelect();
renderAllGroups();
renderFixturesPage();
renderStandingsPage();
</script>
